name: Run E2E Tests

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version to use'
        required: true
        type: string
      run:
        description: 'When false, the job still runs and reports success without doing any work (so the required check reports green instead of skipping).'
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: No relevant changes — reporting success
        if: ${{ !inputs.run }}
        run: echo "No E2E-related changes in this PR. Reporting success without running E2E."

      - name: Checkout repository
        if: ${{ inputs.run }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: ${{ runner.debug == '1' && 'true' || 'false' }}
          persist-credentials: false

      - name: Set up PHP
        if: ${{ inputs.run }}
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ inputs.php-version }}
          coverage: none

      - name: Install Composer dependencies
        if: ${{ inputs.run }}
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4.0.0

      - name: Setup Node.js
        if: ${{ inputs.run }}
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install npm dependencies
        if: ${{ inputs.run }}
        run: npm ci

      - name: Build development assets
        if: ${{ inputs.run }}
        run: npm run build:dev

      - name: Install Playwright dependencies
        if: ${{ inputs.run }}
        run: |
          npx playwright install chromium firefox webkit --with-deps

      - name: Start the Docker testing environment
        if: ${{ inputs.run }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: npm run wp-env:test start

      - name: Run E2E tests
        if: ${{ inputs.run }}
        run: npm run test:e2e

      - name: Upload E2E test results as artifact
        if: ${{ inputs.run && always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: tests/_output
          retention-days: 2
          if-no-files-found: ignore